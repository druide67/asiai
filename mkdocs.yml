site_name: asiai
site_description: Multi-engine LLM benchmark & monitoring CLI for Apple Silicon
site_url: https://asiai.dev
repo_url: https://github.com/druide67/asiai
repo_name: druide67/asiai

theme:
  name: material
  custom_dir: overrides
  logo: assets/logo.svg
  favicon: assets/logo.svg
  font: false
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

extra_css:
  - assets/stylesheets/custom.css

nav:
  - Home: index.md
  - Leaderboard: leaderboard.md
  - Getting Started: getting-started.md
  - Agent Integration: agent.md
  - Architecture: architecture.md
  - Installation: installation.md
  - Commands:
      - detect: commands/detect.md
      - config: commands/config.md
      - bench: commands/bench.md
      - models: commands/models.md
      - monitor: commands/monitor.md
      - doctor: commands/doctor.md
      - daemon: commands/daemon.md
      - setup: commands/setup.md
      - version: commands/version.md
      - tui: commands/tui.md
      - web: commands/web.md
      - mcp: commands/mcp.md
      - leaderboard: commands/leaderboard.md
      - compare: commands/compare.md
      - recommend: commands/recommend.md
  - Engines:
      - Ollama: engines/ollama.md
      - LM Studio: engines/lmstudio.md
      - mlx-lm: engines/mlxlm.md
      - llama.cpp: engines/llamacpp.md
      - oMLX: engines/omlx.md
      - vllm-mlx: engines/vllm-mlx.md
      - Exo: engines/exo.md
  - Ollama vs LM Studio: ollama-vs-lmstudio.md
  - How to Benchmark LLMs on Mac: benchmark-llm-mac.md
  - Benchmark Card: benchmark-card.md
  - Methodology: methodology.md
  - Metrics Spec: metrics-spec.md
  - Benchmark Best Practices: benchmark-best-practices.md
  - TurboQuant on Apple Silicon: turboquant.md
  - FAQ: faq.md

hooks:
  - hooks/copy_well_known.py

plugins:
  - search
  - i18n:
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: fr
          name: Français
          build: true
        - locale: de
          name: Deutsch
          build: true
        - locale: es
          name: Español
          build: true
        - locale: it
          name: Italiano
          build: true
        - locale: pt
          name: Português
          build: true
        - locale: zh
          name: 中文
          build: true
        - locale: ja
          name: 日本語
          build: true
        - locale: ko
          name: 한국어
          build: true
  - git-revision-date-localized:
      enable_creation_date: false
      type: date

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables
