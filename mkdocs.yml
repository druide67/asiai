site_name: asiai
site_description: Multi-engine LLM benchmark & monitoring CLI for Apple Silicon
site_url: https://druide67.github.io/asiai
repo_url: https://github.com/druide67/asiai
repo_name: druide67/asiai

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

nav:
  - Home: index.md
  - Installation: installation.md
  - Commands:
      - detect: commands/detect.md
      - bench: commands/bench.md
      - models: commands/models.md
      - monitor: commands/monitor.md
      - doctor: commands/doctor.md
      - daemon: commands/daemon.md
      - tui: commands/tui.md
  - Engines:
      - Ollama: engines/ollama.md
      - LM Studio: engines/lmstudio.md
      - mlx-lm: engines/mlxlm.md
      - llama.cpp: engines/llamacpp.md
      - vllm-mlx: engines/vllm-mlx.md
  - Methodology: methodology.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
