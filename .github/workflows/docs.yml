name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "overrides/**"
      - "mkdocs.yml"
      - "hooks/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install mkdocs-material
        run: pip install mkdocs-material mkdocs-static-i18n mkdocs-git-revision-date-localized-plugin

      - name: Build docs
        run: mkdocs build

      - name: Ensure .nojekyll and verify dotdirs
        run: |
          touch site/.nojekyll
          ls -la site/ | head -20
          ls -la site/.well-known/ 2>&1 | head -20 || echo "no .well-known dir"

      # actions/upload-pages-artifact@v4 excludes dotfiles by default.
      # Manually tar the site/ directory so .well-known/ and .nojekyll survive,
      # then upload via the generic artifact uploader (which deploy-pages reads).
      - name: Create Pages artifact tar (preserves dotfiles)
        run: tar --dereference --hard-dereference -cf artifact.tar -C site .

      - name: Upload Pages artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: artifact.tar
          retention-days: 1

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
