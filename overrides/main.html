{% extends "base.html" %}

{% block extrahead %}
  <!-- OpenGraph -->
  <meta property="og:title" content="{{ page.title }} — asiai">
  <meta property="og:description" content="Multi-engine LLM benchmark & monitoring CLI for Apple Silicon. 7 engines, GPU observability, community leaderboard.">
  <meta property="og:url" content="{{ page.canonical_url }}">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="asiai">
  <meta property="og:image" content="https://asiai.dev/assets/og-image.png">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.title }} — asiai">
  <meta name="twitter:description" content="Benchmark, monitor, and manage 6 LLM engines on Apple Silicon. Zero dependencies.">
  <meta name="twitter:image" content="https://asiai.dev/assets/og-image.png">
  <meta name="twitter:creator" content="@jmn67">

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "asiai",
    "description": "Multi-engine LLM benchmark & monitoring CLI for Apple Silicon. Compare 6 inference engines side-by-side, monitor GPU metrics, share results with the community.",
    "url": "https://asiai.dev",
    "operatingSystem": "macOS",
    "applicationCategory": "DeveloperApplication",
    "license": "https://opensource.org/licenses/Apache-2.0",
    "author": {
      "@type": "Person",
      "name": "druide67",
      "url": "https://github.com/druide67"
    },
    "codeRepository": "https://github.com/druide67/asiai",
    "softwareVersion": "1.0.0",
    "downloadUrl": "https://pypi.org/project/asiai/",
    "installUrl": "https://pypi.org/project/asiai/",
    "softwareRequirements": "macOS on Apple Silicon (M1/M2/M3/M4), Python 3.11+",
    "screenshot": "https://asiai.dev/assets/og-image.png",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    },
    "keywords": ["LLM", "benchmark", "Apple Silicon", "inference", "monitoring", "CLI", "Ollama", "LM Studio", "MLX"]
  }
  </script>

  <!-- Brand header styling -->
  <style>
    /* Brand name: bolder, slightly larger */
    .md-header__topic:first-child .md-ellipsis {
      font-weight: 700;
      font-size: 1.05rem;
      letter-spacing: -0.3px;
    }
    .md-header__topic:first-child .md-ellipsis .brand-ai {
      color: #00d4aa;
    }
    /* Inline tagline after brand name */
    .md-header__topic:first-child .md-ellipsis .brand-tagline {
      display: inline;
      font-size: 0.7rem;
      font-weight: 400;
      color: rgba(255,255,255,0.9);
      margin-left: 0.5rem;
      letter-spacing: 0;
    }
    /* Hide star/fork counters (0 is not flattering) */
    .md-source__facts { display: none; }
    /* Fix Chrome horizontal scrollbar (grey bar at bottom) */
    html { overflow-x: hidden !important; }
  </style>

  <!-- Brand: color "ai" green + tagline (safe DOM manipulation) -->
  <script>
  document.addEventListener('DOMContentLoaded', function() {
    var el = document.querySelector('.md-header__topic:first-child .md-ellipsis');
    if (el && el.textContent.trim() === 'asiai') {
      while (el.firstChild) el.removeChild(el.firstChild);
      el.appendChild(document.createTextNode('asi'));
      var ai = document.createElement('span');
      ai.className = 'brand-ai';
      ai.textContent = 'ai';
      el.appendChild(ai);
      var tag = document.createElement('span');
      tag.className = 'brand-tagline';
      tag.textContent = '— Multi-engine LLM benchmark & monitoring CLI';
      el.appendChild(tag);
    }
  });
  </script>

  <!-- GoatCounter analytics (privacy-friendly, no cookies) -->
  <script data-goatcounter="https://asiai.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
{% endblock %}
