<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500">
  <defs>
    <!-- Main background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0.6">
      <stop offset="0%" stop-color="#0a0c12"/>
      <stop offset="50%" stop-color="#0f1117"/>
      <stop offset="100%" stop-color="#1a1d2e"/>
    </linearGradient>

    <!-- Accent glow -->
    <radialGradient id="glow" cx="0.75" cy="0.5" r="0.4">
      <stop offset="0%" stop-color="#00d4aa" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#00d4aa" stop-opacity="0"/>
    </radialGradient>

    <!-- Terminal bg -->
    <linearGradient id="termBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a202c"/>
      <stop offset="100%" stop-color="#171b26"/>
    </linearGradient>

    <!-- Subtle grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e2235" stroke-width="0.5" opacity="0.4"/>
    </pattern>

    <!-- Noise texture -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bg)"/>
  <rect width="1500" height="500" fill="url(#grid)" opacity="0.3"/>
  <rect width="1500" height="500" fill="url(#glow)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1500" height="3" fill="#00d4aa"/>
  <rect x="0" y="0" width="400" height="3" fill="#00d4aa" opacity="0.6"/>

  <!-- Decorative diagonal lines (subtle) -->
  <line x1="700" y1="0" x2="750" y2="500" stroke="#00d4aa" stroke-width="0.3" opacity="0.15"/>
  <line x1="720" y1="0" x2="770" y2="500" stroke="#00d4aa" stroke-width="0.3" opacity="0.08"/>

  <!-- ═══════════ LEFT SIDE ═══════════ -->

  <!-- Logo mark -->
  <g transform="translate(60, 160)">
    <!-- Outer glow ring -->
    <rect x="-4" y="-4" width="52" height="52" rx="14" fill="none" stroke="#00d4aa" stroke-width="1" opacity="0.15"/>
    <!-- Main mark -->
    <rect width="44" height="44" rx="11" fill="#00d4aa" opacity="0.12"/>
    <rect width="44" height="44" rx="11" fill="none" stroke="#00d4aa" stroke-width="1.2" opacity="0.3"/>
    <text x="22" y="32" text-anchor="middle" fill="#00d4aa" font-size="22" font-family="'SF Mono',Menlo,Monaco,monospace" font-weight="800">ai</text>
  </g>

  <!-- Logo text -->
  <text x="120" y="200" fill="#e2e8f0" font-size="42" font-family="'SF Pro Display',Inter,system-ui,sans-serif" font-weight="700" letter-spacing="-1">asi<tspan fill="#00d4aa">ai</tspan></text>

  <!-- Tagline -->
  <text x="62" y="248" fill="#718096" font-size="16" font-family="'SF Pro Text',Inter,system-ui,sans-serif" font-weight="400" letter-spacing="0.5">The Speedtest for local LLMs</text>

  <!-- Feature pills row -->
  <g transform="translate(62, 280)">
    <!-- Pill 1 -->
    <rect width="88" height="26" rx="13" fill="#1a202c" stroke="#2d3748" stroke-width="0.8"/>
    <text x="44" y="17" text-anchor="middle" fill="#a0aec0" font-size="10" font-family="'SF Pro Text',Inter,system-ui,sans-serif">6 engines</text>
    <!-- Pill 2 -->
    <rect x="96" width="130" height="26" rx="13" fill="#1a202c" stroke="#2d3748" stroke-width="0.8"/>
    <text x="161" y="17" text-anchor="middle" fill="#a0aec0" font-size="10" font-family="'SF Pro Text',Inter,system-ui,sans-serif">Zero dependencies</text>
    <!-- Pill 3 -->
    <rect x="234" width="150" height="26" rx="13" fill="#1a202c" stroke="#2d3748" stroke-width="0.8"/>
    <text x="309" y="17" text-anchor="middle" fill="#a0aec0" font-size="10" font-family="'SF Pro Text',Inter,system-ui,sans-serif">Apple Silicon native</text>
  </g>

  <!-- ═══════════ RIGHT SIDE — TERMINAL MOCKUP ═══════════ -->

  <g transform="translate(780, 60)">
    <!-- Terminal window -->
    <rect width="660" height="380" rx="10" fill="url(#termBg)" stroke="#2d3748" stroke-width="1"/>

    <!-- Title bar -->
    <rect width="660" height="36" rx="10" fill="#1e2233"/>
    <rect y="26" width="660" height="10" fill="#1e2233"/>
    <!-- Traffic lights -->
    <circle cx="22" cy="18" r="5.5" fill="#fc5c65" opacity="0.9"/>
    <circle cx="42" cy="18" r="5.5" fill="#fed330" opacity="0.9"/>
    <circle cx="62" cy="18" r="5.5" fill="#26de81" opacity="0.9"/>
    <!-- Title -->
    <text x="330" y="22" text-anchor="middle" fill="#4a5568" font-size="12" font-family="'SF Mono',Menlo,Monaco,monospace">asiai bench --quick --card</text>

    <!-- Terminal content -->
    <!-- Prompt line -->
    <text x="24" y="68" fill="#00d4aa" font-size="12" font-family="'SF Mono',Menlo,Monaco,monospace">$</text>
    <text x="40" y="68" fill="#a0aec0" font-size="12" font-family="'SF Mono',Menlo,Monaco,monospace">asiai bench -m qwen3.5 --runs 3 --power</text>

    <!-- System info line -->
    <text x="24" y="96" fill="#4a5568" font-size="11" font-family="'SF Mono',Menlo,Monaco,monospace">Mac Mini M4 Pro — Apple M4 Pro  RAM: 64.0 GB  Pressure: normal</text>

    <!-- Separator -->
    <line x1="24" y1="110" x2="636" y2="110" stroke="#2d3748" stroke-width="0.5"/>

    <!-- Header -->
    <text x="24" y="134" fill="#e2e8f0" font-size="13" font-family="'SF Mono',Menlo,Monaco,monospace" font-weight="600">Benchmark: qwen3.5</text>

    <!-- Column headers -->
    <text x="30" y="164" fill="#718096" font-size="11" font-family="'SF Mono',Menlo,Monaco,monospace">Engine</text>
    <text x="160" y="164" fill="#718096" font-size="11" font-family="'SF Mono',Menlo,Monaco,monospace">tok/s</text>

    <!-- Bar 1: lmstudio (winner) -->
    <text x="30" y="196" fill="#e2e8f0" font-size="13" font-family="'SF Mono',Menlo,Monaco,monospace">lmstudio</text>
    <rect x="158" y="180" width="400" height="24" rx="3" fill="#00d4aa" opacity="0.85"/>
    <text x="566" y="197" fill="#e2e8f0" font-size="12" font-family="'SF Mono',Menlo,Monaco,monospace">72.6 tok/s</text>

    <!-- Bar 2: ollama -->
    <text x="30" y="232" fill="#e2e8f0" font-size="13" font-family="'SF Mono',Menlo,Monaco,monospace">ollama</text>
    <rect x="158" y="216" width="167" height="24" rx="3" fill="#4a5568" opacity="0.85"/>
    <text x="333" y="233" fill="#a0aec0" font-size="12" font-family="'SF Mono',Menlo,Monaco,monospace">30.4 tok/s</text>

    <!-- Winner line -->
    <text x="30" y="274" fill="#00d4aa" font-size="13" font-family="'SF Mono',Menlo,Monaco,monospace" font-weight="600">Winner: lmstudio (2.4x faster)</text>

    <!-- Power line -->
    <text x="30" y="298" fill="#718096" font-size="11" font-family="'SF Mono',Menlo,Monaco,monospace">Power: lmstudio 13.2W (5.52 tok/s/W) — ollama 16.0W (1.89 tok/s/W)</text>

    <!-- Card generation output -->
    <text x="30" y="332" fill="#26de81" font-size="11" font-family="'SF Mono',Menlo,Monaco,monospace">&#x2713; Card saved: ~/.local/share/asiai/cards/bench-card.svg</text>
    <text x="30" y="352" fill="#26de81" font-size="11" font-family="'SF Mono',Menlo,Monaco,monospace">&#x2713; PNG card: ~/.local/share/asiai/cards/bench-card.png</text>
    <text x="30" y="368" fill="#4a5568" font-size="10" font-family="'SF Mono',Menlo,Monaco,monospace">Share URL: asiai.dev/card/a1b2c3d4</text>
  </g>

  <!-- ═══════════ BOTTOM ELEMENTS ═══════════ -->

  <!-- Apple Silicon badge (bottom-left) -->
  <g transform="translate(62, 340)">
    <rect width="140" height="30" rx="15" fill="#0f1117" stroke="#2d3748" stroke-width="0.8"/>
    <!-- Apple-like icon (simple) -->
    <text x="18" y="21" fill="#a0aec0" font-size="14" font-family="'SF Pro Display',system-ui,sans-serif"></text>
    <text x="32" y="20" fill="#a0aec0" font-size="11" font-family="'SF Pro Text',Inter,system-ui,sans-serif">Apple Silicon</text>
  </g>

  <!-- asiai.dev pill (bottom-right) -->
  <g transform="translate(1340, 460)">
    <rect width="100" height="28" rx="14" fill="#0f1117" stroke="#00d4aa" stroke-width="1" opacity="0.8"/>
    <text x="50" y="19" text-anchor="middle" fill="#00d4aa" font-size="13" font-family="'SF Pro Text',Inter,system-ui,sans-serif" font-weight="500">asiai.dev</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="497" width="1500" height="3" fill="#00d4aa" opacity="0.3"/>

  <!-- Subtle noise overlay for texture -->
  <rect width="1500" height="500" fill="transparent" filter="url(#noise)" opacity="0.02"/>
</svg>
