<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="100%" stop-color="#1a1d2e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="#00d4aa"/>

  <!-- Logo + tagline -->
  <rect x="50" y="42" width="30" height="30" rx="7" fill="#00d4aa" opacity="0.2"/>
  <text x="65" y="64" text-anchor="middle" fill="#00d4aa" font-size="16" font-family="Inter,system-ui,sans-serif" font-weight="800">ai</text>
  <text x="90" y="70" fill="#e2e8f0" font-size="28" font-family="Inter,system-ui,sans-serif" font-weight="700">asi<tspan fill="#00d4aa">ai</tspan></text>
  <text x="200" y="70" fill="#718096" font-size="14" font-family="Inter,system-ui,sans-serif">The Speedtest for local LLMs</text>

  <!-- Hardware badge -->
  <rect x="1026" y="48" width="114" height="30" rx="15" fill="#2d3748" stroke="#4a5568" stroke-width="1"/>
  <text x="1083" y="68" text-anchor="middle" fill="#e2e8f0" font-size="13" font-family="Inter,system-ui,sans-serif" font-weight="500">Apple M4 Pro</text>

  <!-- Model name -->
  <text x="60" y="140" fill="#e2e8f0" font-size="24" font-family="Inter,system-ui,sans-serif" font-weight="600">qwen3.5:35b-a3b</text>

  <!-- Terminal frame -->
  <rect x="40" y="170" width="1120" height="380" rx="8" fill="#1a202c" stroke="#2d3748" stroke-width="1"/>
  <circle cx="65" cy="190" r="5" fill="#fc5c65"/>
  <circle cx="85" cy="190" r="5" fill="#fed330"/>
  <circle cx="105" cy="190" r="5" fill="#26de81"/>
  <text x="130" y="195" fill="#718096" font-size="12" font-family="Menlo,Monaco,monospace">asiai bench</text>

  <!-- Column headers -->
  <text x="510" y="230" text-anchor="end" fill="#a0aec0" font-size="12" font-family="Menlo,Monaco,monospace">Engine</text>
  <text x="520" y="230" fill="#a0aec0" font-size="12" font-family="Menlo,Monaco,monospace">tok/s</text>

  <!-- Bars -->
  <text x="510" y="269" text-anchor="end" fill="#e2e8f0" font-size="15" font-family="Menlo,Monaco,monospace">lmstudio</text>
  <rect x="520" y="245" width="580" height="36" rx="4" fill="#00d4aa" opacity="0.9"/>
  <text x="1108" y="269" fill="#e2e8f0" font-size="14" font-family="Menlo,Monaco,monospace">72.6 tok/s</text>
  <text x="510" y="319" text-anchor="end" fill="#e2e8f0" font-size="15" font-family="Menlo,Monaco,monospace">ollama</text>
  <rect x="520" y="295" width="242" height="36" rx="4" fill="#4a5568" opacity="0.9"/>
  <text x="770" y="319" fill="#e2e8f0" font-size="14" font-family="Menlo,Monaco,monospace">30.4 tok/s</text>

  <!-- Winner -->
  <text x="60" y="500" fill="#00d4aa" font-size="16" font-family="Inter,system-ui,sans-serif" font-weight="600">Winner: lmstudio (2.4x faster)</text>

  <!-- Metric chips -->
  <rect x="60" y="540" width="85" height="28" rx="14" fill="#2d3748"/>
  <text x="102" y="559" text-anchor="middle" fill="#a0aec0" font-size="12" font-family="Inter,system-ui,sans-serif">72.6 tok/s</text>
  <rect x="155" y="540" width="85" height="28" rx="14" fill="#2d3748"/>
  <text x="197" y="559" text-anchor="middle" fill="#a0aec0" font-size="12" font-family="Inter,system-ui,sans-serif">280ms TTFT</text>
  <rect x="250" y="540" width="59" height="28" rx="14" fill="#2d3748"/>
  <text x="279" y="559" text-anchor="middle" fill="#a0aec0" font-size="12" font-family="Inter,system-ui,sans-serif">stable</text>

  <!-- Footer -->
  <rect x="1040" y="585" width="100" height="28" rx="14" fill="#1a202c" stroke="#00d4aa" stroke-width="1" opacity="0.8"/>
  <text x="1090" y="604" text-anchor="middle" fill="#00d4aa" font-size="13" font-family="Inter,system-ui,sans-serif" font-weight="500">asiai.dev</text>
</svg>